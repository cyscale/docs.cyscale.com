<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">VM scanning workflow</title>
  <desc id="desc">Virtual machine findings collected through snapshot scanning or SSH scanning and correlated in Cyscale.</desc>
  <defs>
    <linearGradient id="vm-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f9ff"/>
      <stop offset="100%" stop-color="#eef6f2"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#11204d" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f26aa"/>
    </marker>
  </defs>
  <rect width="1200" height="640" rx="28" fill="url(#vm-bg)"/>
  <rect x="56" y="54" width="1088" height="532" rx="24" fill="#ffffff" filter="url(#soft-shadow)"/>
  <text x="96" y="118" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700" fill="#111827">VM vulnerability scanning</text>
  <text x="96" y="154" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Choose snapshot evidence or live SSH collection, then prioritize findings with graph context.</text>

  <g transform="translate(92 218)">
    <rect width="250" height="260" rx="18" fill="#f8fafc" stroke="#d9e1ec" stroke-width="2"/>
    <text x="28" y="42" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">VM fleet</text>
    <g transform="translate(28 70)">
      <rect width="194" height="48" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
      <circle cx="28" cy="24" r="9" fill="#38bdf8"/>
      <text x="52" y="31" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1f2937">Web servers</text>
    </g>
    <g transform="translate(28 132)">
      <rect width="194" height="48" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
      <circle cx="28" cy="24" r="9" fill="#22c55e"/>
      <text x="52" y="31" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1f2937">Workers</text>
    </g>
    <g transform="translate(28 194)">
      <rect width="194" height="48" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
      <circle cx="28" cy="24" r="9" fill="#f59e0b"/>
      <text x="52" y="31" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1f2937">Databases</text>
    </g>
  </g>

  <g transform="translate(430 214)">
    <rect width="310" height="108" rx="18" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <text x="28" y="40" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f26aa">Snapshot scan</text>
    <text x="28" y="72" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">Disk evidence, no in-guest</text>
    <text x="28" y="95" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">credentials required</text>
  </g>
  <g transform="translate(430 370)">
    <rect width="310" height="108" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <text x="28" y="40" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#b45309">SSH scan</text>
    <text x="28" y="72" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">Live OS package inventory</text>
    <text x="28" y="95" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">with approved host access</text>
  </g>

  <line x1="354" y1="320" x2="410" y2="268" stroke="#0f26aa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="354" y1="374" x2="410" y2="424" stroke="#0f26aa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="758" y1="268" x2="842" y2="320" stroke="#0f26aa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="758" y1="424" x2="842" y2="374" stroke="#0f26aa" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(858 214)">
    <rect width="250" height="264" rx="18" fill="#f8fafc" stroke="#d9e1ec" stroke-width="2"/>
    <text x="28" y="42" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Cyscale graph</text>
    <g transform="translate(28 72)">
      <rect width="194" height="44" rx="10" fill="#ffffff" stroke="#fecaca"/>
      <text x="18" y="29" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#b91c1c">Critical CVE</text>
    </g>
    <g transform="translate(28 130)">
      <rect width="194" height="44" rx="10" fill="#ffffff" stroke="#bfdbfe"/>
      <text x="18" y="29" font-family="Inter, Arial, sans-serif" font-size="17" fill="#1e40af">Internet reachable</text>
    </g>
    <g transform="translate(28 188)">
      <rect width="194" height="44" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
      <text x="18" y="29" font-family="Inter, Arial, sans-serif" font-size="17" fill="#166534">Sensitive identity</text>
    </g>
  </g>
</svg>
